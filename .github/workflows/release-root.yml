name: Release Root (mpv-rpc)

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths-ignore:
            - "stremio-mpv-bridge/**"
            - "release.bridge.config.js"

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release-root:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0
                  fetch-tags: true

            - name: Refresh git tags
              run: git fetch --force --tags --prune-tags origin

            - name: Guard against missing root tags
              run: |
                  ROOT_TAG_COUNT=$(git tag -l "mpv-rpc-v*" | wc -l)
                  ROOT_VERSION=$(node -p "require('./package.json').version")

                  if [ "$ROOT_TAG_COUNT" -eq 0 ] && [ "$ROOT_VERSION" != "1.0.0" ]; then
                      echo "::error::No mpv-rpc-v* tag found, but package.json is $ROOT_VERSION. Refusing to publish a reset 1.0.0 release."
                      exit 1
                  fi

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run semantic-release (root)
              run: npx semantic-release
              env:
                  RELEASE_SCOPE: root
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
