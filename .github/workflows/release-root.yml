name: Release Root (mpv-rpc)

on:
    push:
        branches:
            - main
        paths-ignore:
            - "stremio-mpv-bridge/**"
            - "release.bridge.config.js"
            - "semantic-release/**"

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release-root:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run semantic-release (root)
              run: npx semantic-release
              env:
                  RELEASE_SCOPE: root
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
