name: Release Root (mpv-rpc)

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths-ignore:
            - "stremio-mpv-bridge/**"
            - "release.bridge.config.js"

permissions:
    contents: write
    issues: write
    pull-requests: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release-root:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  ref: main
                  fetch-depth: 0
                  fetch-tags: true

            - name: Refresh git tags
              run: git fetch --force --tags --prune-tags origin

            - name: Guard against missing root tags
              run: |
                  ROOT_VERSION=$(node -p "require('./package.json').version")
                  ROOT_LATEST=$(git tag -l "mpv-rpc-v*" | sed "s/^mpv-rpc-v//" | sort -V | tail -n 1)
                  LEGACY_LATEST=$(git tag -l "v*" | sed "s/^v//" | sort -V | tail -n 1)

                  if [ -z "$ROOT_LATEST" ] && [ "$ROOT_VERSION" != "1.0.0" ]; then
                      echo "::error::No mpv-rpc-v* tag found, but package.json is $ROOT_VERSION. Refusing to publish a reset 1.0.0 release."
                      exit 1
                  fi

                  if [ -n "$LEGACY_LATEST" ] && [ -z "$ROOT_LATEST" ]; then
                      echo "::error::Found legacy v$LEGACY_LATEST tag but no mpv-rpc-v* tags. Create mpv-rpc-v$LEGACY_LATEST before releasing."
                      exit 1
                  fi

                  if [ -n "$LEGACY_LATEST" ] && [ -n "$ROOT_LATEST" ]; then
                      HIGHEST_VERSION=$(printf '%s\n%s\n' "$ROOT_LATEST" "$LEGACY_LATEST" | sort -V | tail -n 1)

                      if [ "$HIGHEST_VERSION" = "$LEGACY_LATEST" ] && [ "$LEGACY_LATEST" != "$ROOT_LATEST" ]; then
                          echo "::error::Legacy tag v$LEGACY_LATEST is ahead of mpv-rpc-v$ROOT_LATEST. Create matching mpv-rpc-v$LEGACY_LATEST before releasing."
                          exit 1
                      fi
                  fi

                  if [ -n "$ROOT_LATEST" ]; then
                      echo "Using latest mpv-rpc tag: mpv-rpc-v$ROOT_LATEST"
                  else
                      echo "No existing mpv-rpc tags found; first release path is allowed."
                  fi

                  if [ -n "$LEGACY_LATEST" ]; then
                      echo "Detected latest legacy tag: v$LEGACY_LATEST"
                  else
                      echo "No legacy v* tags detected."
                  fi

                  if [ -n "$ROOT_LATEST" ] && [ "$ROOT_VERSION" != "$ROOT_LATEST" ]; then
                      echo "::warning::package.json is $ROOT_VERSION while latest release tag is mpv-rpc-v$ROOT_LATEST."
                  fi

                  if [ -n "$ROOT_LATEST" ] && [ "$ROOT_VERSION" = "1.0.0" ] && [ "$ROOT_LATEST" != "1.0.0" ]; then
                      echo "::error::package.json reset to 1.0.0 while release history is at mpv-rpc-v$ROOT_LATEST."
                      exit 1
                  fi

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run semantic-release (root)
              run: npx semantic-release
              env:
                  RELEASE_SCOPE: root
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
