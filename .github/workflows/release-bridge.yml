name: Release Bridge (stremio-mpv-bridge)

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            # Keep bridge workflow scoped to bridge-owned files to avoid duplicate
            # runs when shared release tooling changes trigger the root pipeline.
            - "stremio-mpv-bridge/**"
            - "docs/stremio-mpv-bridge.md"
            - "release.bridge.config.js"

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release-bridge:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run semantic-release (bridge)
              run: npx semantic-release
              env:
                  RELEASE_SCOPE: bridge
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
