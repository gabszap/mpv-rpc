name: Release Bridge (stremio-mpv-bridge)

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            # Keep bridge workflow scoped to bridge-owned files to avoid duplicate
            # runs when shared release tooling changes trigger the root pipeline.
            - "stremio-mpv-bridge/**"
            - "docs/stremio-mpv-bridge.md"
            - "release.bridge.config.js"

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release-bridge:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0
                  fetch-tags: true

            - name: Refresh git tags
              run: git fetch --force --tags --prune-tags origin

            - name: Guard against missing bridge tags
              run: |
                  BRIDGE_VERSION=$(node -p "require('./stremio-mpv-bridge/package.json').version")
                  BRIDGE_LATEST=$(git tag -l "bridge-v*" | sed "s/^bridge-v//" | sort -V | tail -n 1)

                  if [ -z "$BRIDGE_LATEST" ] && [ "$BRIDGE_VERSION" != "1.0.0" ]; then
                      echo "::error::No bridge-v* tag found, but stremio-mpv-bridge/package.json is $BRIDGE_VERSION. Refusing to publish a reset 1.0.0 release."
                      exit 1
                  fi

                  if [ -n "$BRIDGE_LATEST" ]; then
                      echo "Using latest bridge tag: bridge-v$BRIDGE_LATEST"
                  else
                      echo "No existing bridge tags found; first release path is allowed."
                  fi

                  if [ -n "$BRIDGE_LATEST" ] && [ "$BRIDGE_VERSION" != "$BRIDGE_LATEST" ]; then
                      echo "::warning::stremio-mpv-bridge/package.json is $BRIDGE_VERSION while latest release tag is bridge-v$BRIDGE_LATEST."
                  fi

                  if [ -n "$BRIDGE_LATEST" ] && [ "$BRIDGE_VERSION" = "1.0.0" ] && [ "$BRIDGE_LATEST" != "1.0.0" ]; then
                      echo "::error::stremio-mpv-bridge/package.json reset to 1.0.0 while release history is at bridge-v$BRIDGE_LATEST."
                      exit 1
                  fi

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run semantic-release (bridge)
              run: npx semantic-release
              env:
                  RELEASE_SCOPE: bridge
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
